<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoServer CQL Filter Tester</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;color:#212529;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#app{display:flex;height:100vh;width:100vw}

/* Sidebar bên trái */
.sidebar{width:460px;min-width:460px;display:flex;flex-direction:column;border-right:1px solid #dee2e6;background:#fff;overflow:hidden}
.header{padding:14px;border-bottom:1px solid #dee2e6;background:#1e293b;color:#fff;display:flex;align-items:center;justify-content:space-between}
.title{font-size:16px;font-weight:600}
.version{font-size:11px;background:#334155;padding:2px 6px;border-radius:4px;color:#94a3b8;margin-left:6px}

/* Header Navigation Actions */
.header-actions{display:flex;gap:4px;align-items:center}
.header-actions a, .header-actions button{color:#94a3b8;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:none;background:none;cursor:pointer;transition:background .15s,color .15s}
.header-actions a:hover, .header-actions button:hover{background:#334155;color:#fff}

.sidebar-body{padding:14px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
textarea{width:100%;border:1px solid #cbd5e1;border-radius:6px;padding:8px 10px;font-family:'SF Mono',Monaco,monospace;font-size:12px;outline:none;resize:vertical;background:#fff;line-height:1.5}
textarea:focus{border-color:#1e293b}
#cqlInput{height:90px;min-height:70px}
#geojsonInput{flex:1;min-height:200px}
.actions{display:flex;gap:8px;padding-top:4px}
.btn{font-size:13px;padding:8px 16px;border-radius:6px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;cursor:pointer;font-weight:500;transition:all .15s}
.btn:hover{background:#f1f5f9}
.btn-primary{background:#0f172a;color:#fff;border-color:#0f172a}
.btn-primary:hover{background:#1e293b}
.err-box{font-size:12px;color:#dc2626;background:#fef2f2;border:1px solid #fee2e2;padding:8px 10px;border-radius:6px;display:none;white-space:pre-wrap;word-break:break-all}

/* Vùng hiển thị bên phải */
.main-content{flex:1;display:flex;flex-direction:column;height:100%;min-width:0}
.map-container{height:60%;position:relative;border-bottom:1px solid #dee2e6}
#map{width:100%;height:100%}
.table-container{height:40%;background:#fff;display:flex;flex-direction:column;overflow:hidden}
.table-header{padding:8px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:#475569}
.table-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px;text-align:left}
th{background:#f1f5f9;color:#475569;font-weight:600;padding:8px 12px;position:sticky;top:0;z-index:10;border-bottom:1px solid #e2e8f0}
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover{background:#f8fafc;cursor:pointer}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-pass{background:#dcfce7;color:#15803d}
.badge-fail{background:#f1f5f9;color:#64748b}

/* ===== SYSTEM DARK MODE OVERRIDES ===== */
html.dark body{background-color:#0f172a;color:#f8fafc}
html.dark .sidebar{background:#1e293b;border-right-color:#334155}
html.dark .header-actions button:hover{color:#fbbf24}
html.dark .field-label{color:#94a3b8}
html.dark textarea{background:#0f172a;color:#f8fafc;border-color:#475569}
html.dark textarea:focus{border-color:#818cf8}
html.dark .btn{background:#1e293b;color:#f8fafc;border-color:#475569}
html.dark .btn:hover{background:#334155}
html.dark .btn-primary{background:#f8fafc;color:#0f172a;border-color:#f8fafc}
html.dark .btn-primary:hover{background:#e2e8f0}
html.dark .err-box{background:#451a1a;border-color:#7f1d1d;color:#fca5a5}
html.dark .map-container{border-bottom-color:#334155}
html.dark .table-container{background:#1e293b}
html.dark .table-header{background:#0f172a;border-bottom-color:#334155;color:#94a3b8}
html.dark th{background:#0f172a;color:#94a3b8;border-bottom-color:#334155}
html.dark td{border-bottom-color:#334155;color:#cbd5e1}
html.dark tr:hover{background:#0f172a}
html.dark .badge-fail{background:#334155;color:#94a3b8}
</style>
</head>
<body>

<div id="app">
  <div class="sidebar">
    <div class="header">
      <div style="display:flex; align-items:center;">
        <span class="title">GeoServer CQL Tester</span>
        <span class="version">v1 Scope</span>
      </div>
      <div class="header-actions">
        <a href="/" title="Về trang chủ"><span class="material-symbols-outlined" style="font-size:20px">home</span></a>
        <button onclick="toggleDarkMode()" title="Chuyển chế độ Sáng/Tối"><span id="theme-icon" class="material-symbols-outlined" style="font-size:20px">light_mode</span></button>
      </div>
    </div>
    <div class="sidebar-body">
      <div class="field-group">
        <div class="field-label">CQL Filter Expression</div>
        <textarea id="cqlInput" spellcheck="false" placeholder="Ví dụ: type = 'Lake' AND area_rating > 5"></textarea>
      </div>
      <div class="field-group" style="flex:1;">
        <div class="field-label">GeoJSON Dataset Input</div>
        <textarea id="geojsonInput" spellcheck="false" placeholder="Dán chuỗi FeatureCollection GeoJSON vào đây..."></textarea>
      </div>
      <div class="err-box" id="errorBox"></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="processFilter()">Chạy Bộ Lọc</button>
        <button class="btn" onclick="loadSample()">Tải Dữ Liệu Mẫu</button>
        <button class="btn" onclick="clearAll()">Xóa Hết</button>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="map-container">
      <div id="map"></div>
    </div>
    <div class="table-container">
      <div class="table-header">
        <span>BẢNG KẾT QUẢ ĐỐI CHIẾU CHI TIẾT</span>
        <span id="summaryText" style="font-weight:normal;color:#64748b"></span>
      </div>
      <div class="table-wrap">
        <table id="resultsTable">
          <thead>
            <tr>
              <th style="width:50px">ID</th>
              <th>Tên / Thuộc tính chính</th>
              <th>Các Thuộc Tính (Properties)</th>
              <th style="width:100px">Kết quả</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:40px">Chưa có dữ liệu. Vui lòng bấm "Tải Dữ Liệu Mẫu" hoặc nhập dữ liệu của bạn rồi bấm "Chạy Bộ Lọc".</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wellknown@0.5.2/wellknown.js"></script>

<script>
// ─── Dark Mode Handler ───────────────────────────────────────────────────────
function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle("dark");
  document.getElementById("theme-icon").textContent = isDark ? "dark_mode" : "light_mode";
  localStorage.setItem("theme", isDark ? "dark" : "light");
  if(window.tileLayer) {
    window.tileLayer.setUrl(isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
  }
}
const isDarkInit = localStorage.getItem("theme") === "dark";
if (isDarkInit) { document.documentElement.classList.add("dark"); }

// ─── Map setup ───────────────────────────────────────────────────────────────
const map = L.map('map').setView([21.0285, 105.84], 13);
window.tileLayer = L.tileLayer(isDarkInit ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, attribution: '&copy; CARTO &copy; OSM'
}).addTo(map);

document.addEventListener("DOMContentLoaded", () => {
  const icon = document.getElementById("theme-icon");
  if (icon && isDarkInit) icon.textContent = "dark_mode";
});

// ─── CORE PARSER ENGINE CHO CQL ──────────────────────────────────────────────
function tokenize(str) {
  const tokens = []; let i = 0;
  while (i < str.length) {
    let ch = str[i];
    if (/\s/.test(ch)) { i++; continue; }
    if ('(),+-*/'.includes(ch)) { tokens.push({ type: 'PUNCT', value: ch }); i++; continue; }
    if (ch === '<' || ch === '>') {
      let next = str[i+1];
      if (ch === '<' && next === '>') { tokens.push({ type: 'OP', value: '<>' }); i += 2; }
      else if (ch === '<' && next === '=') { tokens.push({ type: 'OP', value: '<=' }); i += 2; }
      else if (ch === '>' && next === '=') { tokens.push({ type: 'OP', value: '>=' }); i += 2; }
      else { tokens.push({ type: 'OP', value: ch }); i++; }
      continue;
    }
    if (ch === '=') { tokens.push({ type: 'OP', value: '=' }); i++; continue; }
    if (ch === "'" || ch === '"') {
      let quote = ch, val = ""; i++;
      while (i < str.length && str[i] !== quote) { if (str[i] === '\\') i++; val += str[i]; i++; }
      i++; tokens.push({ type: 'STRING', value: val }); continue;
    }
    if (/[0-9.]/.test(ch)) {
      let val = ""; while (i < str.length && /[0-9.]/.test(str[i])) { val += str[i]; i++; }
      tokens.push({ type: 'NUMBER', value: parseFloat(val) }); continue;
    }
    if (/[a-zA-Z_]/.test(ch)) {
      let val = ""; while (i < str.length && /[a-zA-Z0-9_]/.test(str[i])) { val += str[i]; i++; }
      let upper = val.toUpperCase();
      if (['AND', 'OR', 'NOT', 'LIKE', 'ILIKE', 'BETWEEN', 'IN', 'IS', 'NULL', 'BBOX', 'INTERSECTS'].includes(upper)) {
        tokens.push({ type: 'KEYWORD', value: upper });
      } else { tokens.push({ type: 'IDENT', value: val }); }
      continue;
    }
    throw new Error(`Ký tự lạ không hợp lệ: "${ch}"`);
  }
  return tokens;
}

function parseCQL(tokens) {
  let idx = 0;
  function peek() { return tokens[idx]; }
  function consume(expected) {
    let t = tokens[idx]; if (!t) throw new Error("Cú pháp kết thúc bất ngờ");
    if (expected && t.value !== expected) throw new Error(`Mong đợi "${expected}" nhưng nhận được "${t.value}"`);
    idx++; return t;
  }
  function parseExpression() { return parseOr(); }
  function parseOr() {
    let node = parseAnd();
    while (peek() && peek().value === 'OR') { consume(); node = { type: 'LOGICAL', op: 'OR', left: node, right: parseAnd() }; }
    return node;
  }
  function parseAnd() {
    let node = parseNot();
    while (peek() && peek().value === 'AND') { consume(); node = { type: 'LOGICAL', op: 'AND', left: node, right: parseNot() }; }
    return node;
  }
  function parseNot() {
    if (peek() && peek().value === 'NOT') { consume(); return { type: 'NOT', expr: parseNot() }; }
    return parseComparison();
  }
  function parseComparison() {
    let left = parseArith(); let t = peek(); if (!t) return left;
    if (t.type === 'OP') { consume(); return { type: 'COMPARE', op: t.value, left, right: parseArith() }; }
    if (t.type === 'KEYWORD') {
      if (t.value === 'LIKE' || t.value === 'ILIKE') { consume(); return { type: 'COMPARE', op: t.value, left, right: parseArith() }; }
      if (t.value === 'BETWEEN') {
        consume(); let low = parseArith(); consume('AND'); return { type: 'BETWEEN', expr: left, low, high: parseArith() };
      }
      if (t.value === 'IN') {
        consume(); consume('('); let list = [parseArith()];
        while (peek() && peek().value === ',') { consume(','); list.push(parseArith()); }
        consume(')'); return { type: 'IN', expr: left, list };
      }
      if (t.value === 'IS') {
        consume(); let isNot = false; if (peek() && peek().value === 'NOT') { consume('NOT'); isNot = true; }
        consume('NULL'); return { type: 'ISNULL', expr: left, isNot };
      }
    }
    return left;
  }
  function parseArith() {
    let node = parseTerm();
    while (peek() && peek().type === 'PUNCT' && (peek().value === '+' || peek().value === '-')) {
      node = { type: 'ARITH', op: consume().value, left: node, right: parseTerm() };
    }
    return node;
  }
  function parseTerm() {
    let node = parseFactor();
    while (peek() && peek().type === 'PUNCT' && (peek().value === '*' || peek().value === '/')) {
      node = { type: 'ARITH', op: consume().value, left: node, right: parseFactor() };
    }
    return node;
  }
  function parseFactor() {
    let t = peek(); if (!t) throw new Error("Biểu thức chưa hoàn thiện");
    if (t.type === 'NUMBER' || t.type === 'STRING') { consume(); return { type: 'LITERAL', value: t.value }; }
    if (t.type === 'PUNCT' && t.value === '(') { consume('('); let expr = parseExpression(); consume(')'); return expr; }
    if (t.type === 'KEYWORD' && (t.value === 'BBOX' || t.value === 'INTERSECTS')) {
      let func = consume().value; consume('('); let geomField = consume().value; consume(','); let args = [];
      if (func === 'BBOX') {
        args.push(parseSignNum()); consume(','); args.push(parseSignNum()); consume(',');
        args.push(parseSignNum()); consume(','); args.push(parseSignNum());
      } else if (func === 'INTERSECTS') { args.push(consume().value); }
      consume(')'); return { type: 'SPATIAL', func, geomField, args };
    }
    if (t.type === 'IDENT') { consume(); return { type: 'PROPERTY', name: t.value }; }
    throw new Error(`Token không hợp lệ: "${t.value}"`);
  }
  function parseSignNum() {
    let sign = 1; if (peek() && (peek().value === '-' || peek().value === '+')) { if (consume().value === '-') sign = -1; }
    let t = consume(); if (t.type !== 'NUMBER') throw new Error("Yêu cầu nhập số"); return sign * t.value;
  }
  let ast = parseExpression(); return ast;
}

function evaluateAST(node, feature) {
  if (!node) return null;
  switch(node.type) {
    case 'LITERAL': return node.value;
    case 'PROPERTY': return feature.properties ? feature.properties[node.name] : undefined;
    case 'ARITH': {
      let l = evaluateAST(node.left, feature), r = evaluateAST(node.right, feature);
      if (node.op === '+') return l + r; if (node.op === '-') return l - r;
      if (node.op === '*') return l * r; if (node.op === '/') return l / r;
      return 0;
    }
    case 'LOGICAL': {
      let l = evaluateAST(node.left, feature);
      if (node.op === 'OR') return l || evaluateAST(node.right, feature);
      if (node.op === 'AND') return l && evaluateAST(node.right, feature);
      return false;
    }
    case 'NOT': return !evaluateAST(node.expr, feature);
    case 'COMPARE': {
      let l = evaluateAST(node.left, feature), r = evaluateAST(node.right, feature);
      if (node.op === '=') return l == r; if (node.op === '<>') return l != r;
      if (node.op === '<') return l < r; if (node.op === '>') return l > r;
      if (node.op === '<=') return l <= r; if (node.op === '>=') return l >= r;
      if (node.op === 'LIKE' || node.op === 'ILIKE') {
        if (typeof l !== 'string' || typeof r !== 'string') return false;
        let regexStr = '^' + r.replace(/%/g, '.*').replace(/_/g, '.') + '$';
        return new RegExp(regexStr, node.op === 'ILIKE' ? 'i' : '').test(l);
      }
      return false;
    }
    case 'BETWEEN': { let val = evaluateAST(node.expr, feature); return val >= evaluateAST(node.low, feature) && val <= evaluateAST(node.high, feature); }
    case 'IN': { let val = evaluateAST(node.expr, feature); return node.list.map(n => evaluateAST(n, feature)).includes(val); }
    case 'ISNULL': { let val = evaluateAST(node.expr, feature); let isNull = (val === null || val === undefined); return node.isNot ? !isNull : isNull; }
    case 'SPATIAL': {
      if (!feature.geometry) return false;
      if (node.func === 'BBOX') {
        let [minx, miny, maxx, maxy] = node.args; return turf.booleanIntersects(feature, turf.bboxPolygon([minx, miny, maxx, maxy]));
      }
      if (node.func === 'INTERSECTS') {
        try { let pg = wellknown.parse(node.args[0]); return pg ? turf.booleanIntersects(feature, turf.feature(pg)) : false; } catch(e) { return false; }
      }
    }
  }
  return false;
}

let geojsonLayers = [];
let loadedFeatures = [];
function clearMapLayers() { geojsonLayers.forEach(l => map.removeLayer(l)); geojsonLayers = []; }

function processFilter() {
  const cqlStr = document.getElementById('cqlInput').value.trim();
  const geojsonStr = document.getElementById('geojsonInput').value.trim();
  const errorBox = document.getElementById('errorBox');
  const tbody = document.getElementById('tableBody');
  errorBox.style.display = 'none'; tbody.innerHTML = ''; clearMapLayers();

  if (!geojsonStr) { showError("Lỗi: Vui lòng nhập dữ liệu nguồn GeoJSON!"); return; }
  let geojson; try { geojson = JSON.parse(geojsonStr); } catch(e) { showError("Lỗi GeoJSON: " + e.message); return; }

  let features = geojson.type === 'FeatureCollection' ? geojson.features : [geojson];
  loadedFeatures = features;

  let ast = null;
  if (cqlStr) { try { ast = parseCQL(tokenize(cqlStr)); } catch(e) { showError("Lỗi CQL: " + e.message); return; } }

  let passCount = 0; const mapBounds = L.latLngBounds();
  features.forEach((feature, idx) => {
    let isPass = ast ? evaluateAST(ast, feature) : true; if (isPass) passCount++;
    let layerStyle = isPass ? { color: "#1d4ed8", fillColor: "#3b82f6", weight: 3, fillOpacity: 0.65, radius: 8 } : { color: "#94a3b8", fillColor: "#cbd5e1", weight: 1, fillOpacity: 0.15, radius: 4 };

    if (feature.geometry) {
      let layer = L.geoJSON(feature, { pointToLayer: (p, ll) => L.circleMarker(ll, layerStyle), style: layerStyle }).addTo(map);
      if (feature.properties && feature.properties.name) layer.bindTooltip(feature.properties.name);
      geojsonLayers.push(layer);
      try { let b = layer.getBounds(); if (b.isValid()) mapBounds.extend(b); } catch(e) { if (feature.geometry.type === 'Point') mapBounds.extend([feature.geometry.coordinates[1], feature.geometry.coordinates[0]]); }
    }

    const nameAttr = feature.properties ? (feature.properties.name || 'Feature ' + idx) : 'No Props';
    const propsSnippet = JSON.stringify(feature.properties || {});
    const tr = document.createElement('tr');
    tr.id = `tr-feat-${idx}`; tr.onclick = () => focusFeature(idx);
    tr.innerHTML = `<td><b>${idx}</b></td><td style="font-weight:500">${nameAttr}</td><td><code>${propsSnippet}</code></td><td><span class="badge ${isPass ? 'badge-pass' : 'badge-fail'}">${isPass ? '✓ PASS' : '✕ FAIL'}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('summaryText').textContent = `Tìm thấy: ${passCount} / ${features.length} pass.`;
  if (mapBounds.isValid() && features.length > 0) map.fitBounds(mapBounds, { padding: [40, 40] });
}

function focusFeature(idx) {
  document.querySelectorAll('#tableBody tr').forEach(r => r.style.background = '');
  if(document.getElementById(`tr-feat-${idx}`)) document.getElementById(`tr-feat-${idx}`).style.background = 'rgba(59,130,246,0.1)';
  let l = geojsonLayers[idx]; if (l) { try { if (l.getBounds) map.fitBounds(l.getBounds(), { maxZoom: 16 }); else map.setView(l.getLatLng(), 16); } catch(e){} }
}
function showError(msg) { const b = document.getElementById('errorBox'); b.textContent = msg; b.style.display = 'block'; }
function clearAll() { document.getElementById('cqlInput').value = ''; document.getElementById('geojsonInput').value = ''; clearMapLayers(); document.getElementById('tableBody').innerHTML = ''; }
function loadSample() {
  document.getElementById('cqlInput').value = `type = 'Lake' AND area_rating + 2 > 6`;
  document.getElementById('geojsonInput').value = JSON.stringify({"type":"FeatureCollection","features":[{"type":"Feature","properties":{"name":"Hồ Tây","type":"Lake","area_rating":9},"geometry":{"type":"Polygon","coordinates":[[[105.8,21.05],[105.83,21.05],[105.83,21.08],[105.8,21.08],[105.8,21.05]]]}}]}, null, 2);
  processFilter();
}
</script>
</body>
</html>
