<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>English Academic Deck</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght,ital@6..72,400,0;6..72,600,0;6..72,700,0;6..72,400,1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              surface: "#f9f9f9",
              "on-primary-fixed": "#000767",
              "on-primary": "#ffffff",
              "surface-bright": "#f9f9f9",
              "error-container": "#ffdad6",
              "on-secondary-container": "#705e00",
              "tertiary-fixed-dim": "#c4c6d2",
              "on-surface": "#1a1c1c",
              "secondary-container": "#fdd835",
              "on-tertiary": "#ffffff",
              "on-error-container": "#93000a",
              "on-tertiary-container": "#9597a2",
              tertiary: "#181b23",
              "on-surface-variant": "#454652",
              "surface-container-high": "#e8e8e8",
              "secondary-fixed-dim": "#e8c41d",
              "on-tertiary-fixed": "#181b24",
              "on-secondary-fixed": "#221b00",
              "surface-container": "#eeeeee",
              "surface-container-lowest": "#ffffff",
              "inverse-on-surface": "#f1f1f1",
              "surface-tint": "#4c56af",
              "on-primary-container": "#8690ee",
              "on-secondary": "#ffffff",
              secondary: "#705d00",
              background: "#f9f9f9",
              "surface-variant": "#e2e2e2",
              outline: "#767683",
              "primary-container": "#1a237e",
              "on-background": "#1a1c1c",
              "on-tertiary-fixed-variant": "#434750",
              "surface-dim": "#dadada",
              "tertiary-container": "#2c3039",
              "surface-container-low": "#f3f3f3",
              error: "#ba1a1a",
              "secondary-fixed": "#ffe16e",
              "tertiary-fixed": "#e0e2ee",
              "on-error": "#ffffff",
              "on-secondary-fixed-variant": "#544600",
              "inverse-primary": "#bdc2ff",
              "outline-variant": "#c6c5d4",
              "on-primary-fixed-variant": "#343d96",
              primary: "#000666",
              "primary-fixed-dim": "#bdc2ff",
              "primary-fixed": "#e0e0ff",
              "inverse-surface": "#2f3131",
              "surface-container-highest": "#e2e2e2",
              "academic-gold": "#705d00",
              "academic-gold-light": "#FFF9C4",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              gutter: "32px",
              "element-gap": "16px",
              "container-padding": "64px",
              unit: "8px",
              "section-gap": "48px",
            },
            fontFamily: {
              "body-md": ["Inter"],
              quote: ["Newsreader"],
              h1: ["Newsreader"],
              "body-lg": ["Inter"],
              "label-caps": ["Inter"],
              h3: ["Newsreader"],
              h2: ["Newsreader"],
            },
          },
        },
      };
    </script>
    <style>
      /* Header — tránh notch/Dynamic Island */
      header {
        padding-top: max(0px, env(safe-area-inset-top));
      }

      /* Footer — tránh home indicator bar */
      footer {
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        white-space: nowrap;
        direction: ltr;
      }

      body {
        min-height: max(884px, 100dvh);
      }

      .academic-gold-accent {
        border-left: 4px solid #705d00;
      }

      .zebra-striping tr:nth-child(even) {
        background-color: #f3f3f3;
      }

      .pro-tip-bg {
        background-color: #fff9c4;
      }

      .drop-zone {
        border: 2px dashed #c6c5d4;
        transition: all 0.2s ease;
      }

      .drop-zone:hover {
        border-color: #4c56af;
        background-color: #f3f3f3;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1a237e;
      }

      /* Slide Transitions */
      .slide-section {
        display: none;
      }

      .slide-section.active {
        display: block;
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* Flip Card CSS */
      .flip-card {
        perspective: 1000px;
        cursor: pointer;
        min-height: 220px;
      }

      .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: left;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
      }

      .flip-card.flipped .flip-card-inner {
        transform: rotateY(180deg);
      }

      .flip-card-front,
      .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 0.5rem;
      }

      .flip-card-front {
        transform: rotateY(0deg);
        /* Fix for Webkit bleed-through */
      }

      .flip-card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 1.5rem;
        background-color: #fdd835;
        border: 2px solid #705e00;
      }

      /* Custom Select for Reading */
      select.reading-blank,
      select.reading-blank-2 {
        -webkit-appearance: none;
        -moz-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
        background-repeat: no-repeat;
        background-position-x: 100%;
        background-position-y: 5px;
        padding-right: 1.5rem;
      }
      /* ===== DARK MODE OVERRIDES (REFINED) ===== */
      /* 1. Màu nền chính (Slate 900) - Xám tối êm dịu */
      html.dark body,
      html.dark main,
      html.dark .bg-surface,
      html.dark .bg-background {
        background-color: #0f172a !important;
        color: #f8fafc !important;
      }

      /* 2. Các khối nổi (Cards, Header, Footer) (Slate 800) - Sáng hơn nền một chút để tạo độ sâu */
      html.dark header,
      html.dark footer,
      html.dark #modules-content,
      html.dark .bg-white,
      html.dark .bg-surface-container-low,
      html.dark .bg-surface-container-highest,
      html.dark .flip-card-front.bg-white,
      html.dark tr.bg-white,
      html.dark tr.bg-surface-container-low,
      html.dark .drop-zone {
        background-color: #1e293b !important;
        border-color: #334155 !important;
        color: #f8fafc !important;
      }

      /* 3. Xử lý Text - Giảm độ chói */
      html.dark .text-on-surface {
        color: #f8fafc !important;
      }
      html.dark .text-on-surface-variant,
      html.dark .text-outline {
        color: #94a3b8 !important;
      }

      /* 4. Đổi màu chữ xanh đậm (Primary) sang màu xanh nhạt (Indigo 400) cho dễ đọc trên nền tối */
      html.dark .text-indigo-900,
      html.dark .text-indigo-950,
      html.dark .text-primary,
      html.dark .text-primary-container {
        color: #818cf8 !important;
      }
      html.dark .border-primary {
        border-color: #818cf8 !important;
      }
      html.dark .bg-primary {
        background-color: #4f46e5 !important;
      }

      /* 5. Khung Pro-tip và Academic Insight (Vàng/Nâu tối) */
      html.dark .pro-tip-bg,
      html.dark [class*="bg-[#FFF9C4]"] {
        background-color: #422006 !important; /* Nền nâu tối */
        border-color: #b45309 !important;
      }
      html.dark .text-secondary,
      html.dark .text-secondary-container,
      html.dark .text-academic-gold {
        color: #fbbf24 !important; /* Chữ vàng sáng */
      }
      html.dark .flip-card-back {
        background-color: #b45309 !important;
        border-color: #fbbf24 !important;
      }

      /* 6. Viền chung mỏng nhẹ (Slate 700) */
      html.dark .border-outline-variant,
      html.dark .border-gray-200,
      html.dark .border-gray-100 {
        border-color: #334155 !important;
      }

      /* 7. Input, Textarea, Select */
      html.dark textarea,
      html.dark select {
        background-color: #0f172a !important;
        color: #f8fafc !important;
        border-color: #475569 !important;
      }
      /* Đổi icon mũi tên của thẻ select sang màu trắng */
      html.dark select {
        background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") !important;
      }

      /* 8. Hover và các dải màu xen kẽ trong bảng */
      html.dark tr.bg-primary-container\/5,
      html.dark tr.bg-tertiary-fixed\/30 {
        background-color: #334155 !important;
      }
      html.dark .mcq-option:hover,
      html.dark [class*="vocab-option-"]:hover {
        background-color: #334155 !important;
        border-color: #818cf8 !important;
      }
    </style>
  </head>

  <body
    class="bg-surface text-on-surface font-body-md overflow-x-hidden flex flex-col"
  >
    <div
      class="fixed top-0 left-0 w-full h-1 bg-surface-container-highest z-[60]"
    >
      <div
        id="progress-fill"
        class="h-full bg-secondary-container transition-all duration-300"
        style="width: 0%"
      ></div>
    </div>

    <header
      class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 md:px-16 h-20 bg-white border-t-4 border-amber-400 border-b border-gray-200"
    >
      <div class="flex items-center gap-2 md:gap-4">
        <span
          class="material-symbols-outlined text-indigo-900"
          data-icon="lesson-theme"
          >school</span
        >
        <h1
          id="header-title"
          class="font-serif text-lg md:text-2xl font-bold tracking-tight text-indigo-950"
        >
          Work & Career
        </h1>
      </div>
      <div class="flex items-center gap-4 md:gap-8">
        <nav class="hidden md:flex gap-6">
          <span
            id="nav-vocab"
            onclick="navigateToSection('vocabulary')"
            class="nav-item text-indigo-900 font-bold font-serif antialiased cursor-pointer px-2 rounded transition-colors"
            >Vocabulary</span
          >
          <span
            id="nav-grammar"
            onclick="navigateToSection('grammar')"
            class="nav-item text-gray-500 font-serif antialiased hover:bg-indigo-50 transition-colors px-2 cursor-pointer rounded"
            >Grammar</span
          >
          <span
            id="nav-exercise"
            onclick="navigateToSection('exercise')"
            class="nav-item text-gray-500 font-serif antialiased hover:bg-indigo-50 transition-colors px-2 cursor-pointer rounded"
            >Exercise</span
          >
        </nav>
        <button
          onclick="toggleDarkMode()"
          class="p-2 rounded-full hover:bg-indigo-50 dark:hover:bg-white/10 transition-colors text-indigo-900 dark:text-amber-400 flex items-center justify-center"
          title="Chuyển chế độ Sáng/Tối"
        >
          <span id="theme-icon" class="material-symbols-outlined"
            >light_mode</span
          >
        </button>
      </div>
    </header>

    <main
      class="flex-grow pt-28 pb-28 px-4 md:px-container-padding flex items-center justify-center w-full max-w-[1440px] mx-auto min-h-screen"
    >
      <div id="lesson-root" class="w-full"></div>
    </main>

    <footer
      class="fixed bottom-0 left-0 w-full z-40 grid grid-cols-3 items-center px-4 md:px-16 py-3 md:py-4 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]"
      style="padding-bottom: max(12px, env(safe-area-inset-bottom))"
    >
      <!-- Nút Previous (Đã bỏ w-1/3) -->
      <button
        id="btn-prev"
        onclick="changeSlide(-1)"
        class="flex flex-col items-center justify-center text-indigo-900/60 hover:text-amber-500 transition-all active:scale-95 duration-100"
      >
        <span class="material-symbols-outlined">arrow_back</span>
        <span
          class="font-serif text-[10px] md:text-xs font-medium uppercase tracking-widest mt-1"
          >Previous</span
        >
      </button>

      <!-- Nút Modules ở giữa (Đã bỏ w-1/3) -->
      <button
        onclick="toggleModulesMenu()"
        class="flex flex-col items-center justify-center text-amber-600 font-bold hover:text-amber-500 transition-all active:scale-95 duration-100"
      >
        <span
          class="material-symbols-outlined"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >grid_view</span
        >
        <span
          class="font-serif text-[10px] md:text-xs font-medium uppercase tracking-widest mt-1"
          >Modules</span
        >
      </button>

      <!-- Nút Next (Đã bỏ w-1/3) -->
      <button
        id="btn-next"
        onclick="changeSlide(1)"
        class="flex flex-col items-center justify-center text-indigo-900/60 hover:text-amber-500 transition-all active:scale-95 duration-100"
      >
        <span class="material-symbols-outlined">arrow_forward</span>
        <span
          class="font-serif text-[10px] md:text-xs font-medium uppercase tracking-widest mt-1"
          >Next</span
        >
      </button>
    </footer>

    <div
      id="modules-menu"
      class="fixed inset-0 bg-black/50 z-[100] hidden flex items-end md:items-center justify-center transition-opacity"
    >
      <div
        class="bg-white w-full md:w-[400px] rounded-t-2xl md:rounded-2xl p-6 transform translate-y-full transition-transform duration-300 shadow-2xl"
        id="modules-content"
      >
        <div class="flex justify-between items-center mb-6">
          <h3 class="font-h3 text-2xl text-primary">Select Module</h3>
          <button
            onclick="toggleModulesMenu()"
            class="text-on-surface-variant hover:text-error transition-colors"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div id="modules-list" class="flex flex-col gap-4"></div>
      </div>
    </div>

    <script src="js/engine.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
